name: AI Fix on /fix Command

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    # Only on PRs, only from jay9297, only when comment starts with /fix
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'jay9297' &&
      startsWith(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      EMERGENCY_ANTHROPIC_API_KEY: ${{ secrets.EMERGENCY_ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Resolve PR head ref
        id: pr
        run: |
          PR_NUM=${{ github.event.issue.number }}
          DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM})
          echo "head_ref=$(echo "$DATA" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$DATA" | jq -r '.base.ref')" >> "$GITHUB_OUTPUT"
          echo "pr_num=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ANTHROPIC_API_KEY is NOT set
        run: |
          if [[ -n "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::ANTHROPIC_API_KEY is set; would override Pro subscription auth and incur PAYG charges"
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps + Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr xvfb \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libegl1 libopengl0
          pip install -r sin_guide/requirements.txt
          pip install pytest pytest-cov pytest-qt pytest-xvfb ruff mypy

      - name: Install agent tooling if missing
        run: |
          command -v claude || npm install -g @anthropic-ai/claude-code
          command -v opencode || curl -fsSL https://opencode.ai/install | bash

      - name: Collect context
        run: |
          PR_NUM=${{ steps.pr.outputs.pr_num }}
          REPO=${{ github.repository }}

          USER_EXTRA=$(echo "${{ github.event.comment.body }}" | sed 's|^/fix||' | sed 's/^[[:space:]]*//')
          echo "$USER_EXTRA" > /tmp/user_extra.txt

          gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]")] | last | .body // ""' \
            > /tmp/ai_review.txt

          gh api "repos/${REPO}/pulls/${PR_NUM}/comments" \
            --jq '.[] | "File: \(.path) (line \(.line // .original_line))\n\(.body)\n"' \
            > /tmp/inline_comments.txt

          git diff "origin/${{ steps.pr.outputs.base_ref }}...HEAD" > /tmp/pr.diff
          git diff --stat "origin/${{ steps.pr.outputs.base_ref }}...HEAD" > /tmp/pr.summary

      - name: Build agent prompt
        run: |
          PR_NUM=${{ steps.pr.outputs.pr_num }}

          cat > /tmp/fix-comment-prompt.txt << PROMPT_EOF
          You are addressing feedback on PR #${PR_NUM} in jay9297/SinsGuide.
          @jay9297 has reviewed the AI feedback and issued a /fix command.

          Follow the rules in CLAUDE.md. Make the minimal correct changes to satisfy
          the feedback below. Add or update tests in tests/. Do NOT run the test suite yourself.
          If you change UI rendering, note that snapshot tests may need regeneration.
          Do not commit — just make the file changes.

          === Additional instructions from @jay9297 ===
          $(cat /tmp/user_extra.txt)

          === AI review feedback to address ===
          $(cat /tmp/ai_review.txt)

          === Inline review comments ===
          $(cat /tmp/inline_comments.txt)

          === PR diff summary ===
          $(cat /tmp/pr.summary)
          PROMPT_EOF

      - name: Run AI agent
        run: |
          source scripts/agent-lib.sh
          run_agent_with_fallback /tmp/fix-comment-prompt.txt fix 40

      - name: Verify tests pass
        run: xvfb-run -a pytest tests/ -v

      - name: Push fixes and notify
        run: |
          PR_NUM=${{ steps.pr.outputs.pr_num }}

          git config user.name "ai-agent[bot]"
          git config user.email "ai-agent@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            gh pr comment "$PR_NUM" \
              --body "🤖 Agent ran but found no changes needed. If something was missed, please clarify."
          else
            USER_EXTRA=$(cat /tmp/user_extra.txt)
            COMMIT_MSG="fix: address review feedback"
            if [[ -n "$USER_EXTRA" ]]; then
              COMMIT_MSG="fix: address review feedback — ${USER_EXTRA}"
            fi
            git commit -m "$COMMIT_MSG"
            source scripts/agent-lib.sh
            retry_op 5 10 git push origin HEAD
            gh pr comment "$PR_NUM" \
              --body "🤖 Changes pushed to address the review feedback. Please re-review."
          fi
