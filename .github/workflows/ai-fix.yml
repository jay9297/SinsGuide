name: AI Fix
on:
  issues:
    types: [labeled]

jobs:
  apply-fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      EMERGENCY_ANTHROPIC_API_KEY: ${{ secrets.EMERGENCY_ANTHROPIC_API_KEY }}
    outputs:
      branch: ${{ steps.push.outputs.branch }}
      issue_num: ${{ steps.meta.outputs.issue_num }}
      issue_title: ${{ steps.meta.outputs.issue_title }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Verify ANTHROPIC_API_KEY is NOT set
        run: |
          if [[ -n "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::ANTHROPIC_API_KEY is set; would override Pro subscription auth and incur PAYG charges"
            exit 1
          fi

      - name: Extract issue metadata
        id: meta
        run: |
          echo "issue_num=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"
          echo "issue_title=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code & OpenCode if missing
        run: |
          command -v claude || npm install -g @anthropic-ai/claude-code
          command -v opencode || curl -fsSL https://opencode.ai/install | bash

      - name: Checkout or create fix branch
        id: branch_setup
        run: |
          BRANCH="ai-fix/issue-${{ steps.meta.outputs.issue_num }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "is_retry=true" >> "$GITHUB_OUTPUT"
            echo "Branch $BRANCH exists — checking out for retry"
            git checkout -b "$BRANCH" "origin/$BRANCH"
          else
            echo "is_retry=false" >> "$GITHUB_OUTPUT"
            echo "Branch $BRANCH does not exist — creating fresh from dev"
            git checkout -b "$BRANCH"
          fi

      - name: Build implementation prompt
        id: plan
        run: |
          ISSUE_BODY=$(jq -r '.issue.body' "$GITHUB_EVENT_PATH")
          IS_RETRY="${{ steps.branch_setup.outputs.is_retry }}"

          if [[ "$IS_RETRY" == "true" ]]; then
            echo "Retry detected — skipping planning phase, building retry prompt directly"
            PREV_COMMITS=$(git log "origin/dev..HEAD" --oneline 2>/dev/null || echo "none")

            {
              printf 'You are continuing a fix for GitHub issue #%s in jay9297/SinsGuide.\n' \
                '${{ steps.meta.outputs.issue_num }}'
              printf 'Title: %s\n\n' '${{ steps.meta.outputs.issue_title }}'
              printf 'A previous attempt already made changes on this branch. Prior commits:\n%s\n\n' \
                "$PREV_COMMITS"
              printf 'Review the existing changes and either build on them or correct them.\n'
              printf 'Do NOT revert work that is already correct.\n'
              printf 'Make the minimal additional change per CLAUDE.md.\n'
              printf 'Add or update tests in tests/. Do NOT run the test suite yourself.\n'
              printf 'If you change UI rendering, note snapshot tests may need regeneration.\n'
            } > /tmp/impl-prompt.txt

            echo "impl_model=" >> "$GITHUB_OUTPUT"
          else
            echo "Fresh branch — running planning phase"

            # Fetch the live model list so Claude picks from what is actually available.
            AVAILABLE_MODELS=$(OPENCODE_API_KEY="${OPENCODE_API_KEY}" opencode models 2>/dev/null \
              || echo "(model list unavailable — pick conservatively)")

            cat > /tmp/plan-prompt.txt << PROMPT_EOF
          You are planning the fix for GitHub issue #${{ steps.meta.outputs.issue_num }} in jay9297/SinsGuide.

          Title: ${{ steps.meta.outputs.issue_title }}

          Body:
          ${ISSUE_BODY}

          Explore the codebase (read-only), then write a detailed implementation
          plan that a separate coding agent will execute. Cover:
          - Which files to change and why
          - Specific code changes (pseudocode or exact snippets where helpful)
          - New or updated tests to add under tests/
          - Edge cases and gotchas to watch for

          Follow the conventions in CLAUDE.md. Keep the plan precise and
          actionable. Do NOT make any code changes yourself.

          After the plan, choose the best free/low-cost model from the list
          below based on task complexity (prefer stronger models for multi-file
          or architectural changes; faster models for focused single-area fixes).
          End your response with exactly this line:
          IMPLEMENTATION_MODEL: <slug>

          Currently available models:
          ${AVAILABLE_MODELS}
          PROMPT_EOF

            source scripts/agent-lib.sh
            PLAN=$(run_agent_with_fallback /tmp/plan-prompt.txt plan 30)

            IMPL_MODEL=$(printf '%s' "$PLAN" | grep -oP '(?<=IMPLEMENTATION_MODEL:)\s*\K\S+' 2>/dev/null || echo "")
            echo "impl_model=${IMPL_MODEL}" >> "$GITHUB_OUTPUT"
            echo "Planning agent chose implementation model: '${IMPL_MODEL}'"

            {
              printf 'You are implementing the fix for GitHub issue #%s in jay9297/SinsGuide.\n' \
                '${{ steps.meta.outputs.issue_num }}'
              printf 'Title: %s\n\n' '${{ steps.meta.outputs.issue_title }}'
              printf 'Follow the plan below. Make the minimal correct change per CLAUDE.md.\n'
              printf 'Add or update tests in tests/. Do NOT run the test suite yourself.\n'
              printf 'If you change UI rendering, note snapshot tests may need regeneration.\n\n'
              printf 'Implementation plan:\n%s\n' "$PLAN"
            } > /tmp/impl-prompt.txt
          fi

      - name: Execute implementation plan
        run: |
          source scripts/agent-lib.sh
          IMPL_MODEL="${{ steps.plan.outputs.impl_model }}"
          [[ -n "$IMPL_MODEL" ]] && echo "Using planning agent's model recommendation: $IMPL_MODEL"
          run_agent_with_fallback /tmp/impl-prompt.txt implement 80 "" "$IMPL_MODEL"

      - name: Commit and push branch
        id: push
        run: |
          BRANCH="${{ steps.branch_setup.outputs.branch }}"
          git config user.name "ai-agent[bot]"
          git config user.email "ai-agent@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            AHEAD=$(git rev-list --count "origin/dev..HEAD" 2>/dev/null || echo "0")
            if [[ "${{ steps.branch_setup.outputs.is_retry }}" == "true" && "$AHEAD" -gt 0 ]]; then
              echo "Agent made no new changes but branch has $AHEAD existing commit(s) — proceeding with existing work"
              echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::No changes produced by agent and no existing commits on branch"
            exit 1
          fi

          git commit -m "fix: resolve issue #${{ steps.meta.outputs.issue_num }}

          Generated by AI agent. Requires human review before merge."

          source scripts/agent-lib.sh
          retry_op 5 10 git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Post failure comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/agent-lib.sh
          retry_op 3 10 gh issue comment ${{ steps.meta.outputs.issue_num }} \
            --body "⚠️ **AI Fix Failed**

          The \`apply-fix\` job failed after exhausting all agent tiers and retry cycles.
          This likely indicates an API outage or expired credentials.

          **What to check:**
          - \`CLAUDE_CODE_OAUTH_TOKEN\` — is the Pro subscription active?
          - \`OPENCODE_API_KEY\` — is the key valid?
          - \`EMERGENCY_ANTHROPIC_API_KEY\` — set this secret for last-resort fallback.

          Re-add the \`ai-fix\` label once credentials are restored to retry." || true

  verify-and-fix:
    needs: apply-fix
    runs-on: [self-hosted, bazzite]
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      EMERGENCY_ANTHROPIC_API_KEY: ${{ secrets.EMERGENCY_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply-fix.outputs.branch }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "ai-agent[bot]"
          git config user.email "ai-agent@users.noreply.github.com"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps + Python deps
        run: |
          if command -v apt-get > /dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y tesseract-ocr xvfb \
              libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 \
              libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
              libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
              libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
              libegl1 libopengl0
          else
            echo "Skipping system package install — sudo unavailable or no apt-get; assuming packages pre-installed on self-hosted runner"
          fi
          # Install evdev-binary (pre-built wheel) then register it as 'evdev' so
          # pynput's dependency is satisfied without requiring kernel headers.
          pip install evdev-binary
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          EVDEV_VERSION=$(pip show evdev-binary | grep ^Version: | awk '{print $2}')
          EVDEV_DIST="$SITE_PACKAGES/evdev-${EVDEV_VERSION}.dist-info"
          if [ ! -d "$EVDEV_DIST" ]; then
            mkdir -p "$EVDEV_DIST"
            printf 'Metadata-Version: 2.1\nName: evdev\nVersion: %s\n' "$EVDEV_VERSION" \
              > "$EVDEV_DIST/METADATA"
            printf 'pip\n' > "$EVDEV_DIST/INSTALLER"
            touch "$EVDEV_DIST/RECORD"
          fi
          pip install -r sin_guide/requirements.txt
          pip install pytest pytest-cov pytest-qt pytest-xvfb ruff mypy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install agent tooling if missing
        run: |
          command -v claude || npm install -g @anthropic-ai/claude-code
          command -v opencode || curl -fsSL https://opencode.ai/install | bash

      - name: Build verify-fix prompt template
        run: |
          cat > /tmp/verify-fix-prompt-template.txt << 'PROMPT_EOF'
          The AI agent previously made changes to fix a GitHub issue, but the test
          suite is now failing. Fix the failing tests without reverting the original
          fix. Make the minimal change needed. Follow CLAUDE.md.

          Failing test output:
          PROMPT_EOF

      - name: Verify and auto-fix loop
        run: |
          source scripts/agent-lib.sh

          MAX_RETRIES=3
          ATTEMPT=0

          run_tests() {
            local output_file="$1"
            local failed=0
            xvfb-run -a pytest tests/ -v 2>&1 | tee -a "$output_file" || failed=1
            return $failed
          }

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            OUTPUT_FILE="/tmp/test-output-attempt-${ATTEMPT}.txt"
            > "$OUTPUT_FILE"

            echo "::group::Test attempt $ATTEMPT of $MAX_RETRIES"
            if run_tests "$OUTPUT_FILE"; then
              echo "✅ Tests passed on attempt $ATTEMPT"
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Tests failed on attempt $ATTEMPT"

            cp "$OUTPUT_FILE" "/tmp/test-failures-attempt-${ATTEMPT}.txt"

            if [ $ATTEMPT -ge $MAX_RETRIES ]; then
              echo "::error::Tests still failing after $MAX_RETRIES fix attempts"
              exit 1
            fi

            cp /tmp/verify-fix-prompt-template.txt /tmp/verify-fix-prompt-current.txt
            cat "$OUTPUT_FILE" >> /tmp/verify-fix-prompt-current.txt

            echo "🤖 Running agent to fix test failures (attempt $ATTEMPT)..."
            run_agent_with_fallback /tmp/verify-fix-prompt-current.txt implement 20

            if git diff --quiet && git diff --cached --quiet; then
              echo "::error::Agent produced no changes — cannot recover from test failures"
              exit 1
            fi

            git add -A
            retry_op 5 10 git commit -m "fix(tests): address failures — attempt $ATTEMPT [ai-agent]

            Issue: #${{ needs.apply-fix.outputs.issue_num }}"
            retry_op 5 10 git push
          done

      - name: Upload test failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-issue-${{ needs.apply-fix.outputs.issue_num }}
          path: /tmp/test-failures-attempt-*.txt
          retention-days: 7

  open-pr:
    needs: [apply-fix, verify-and-fix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply-fix.outputs.branch }}

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/agent-lib.sh

          EXISTING_PR=$(gh pr list \
            --head "${{ needs.apply-fix.outputs.branch }}" \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [[ -n "$EXISTING_PR" ]]; then
            echo "PR #${EXISTING_PR} already exists for this branch — skipping creation"
            exit 0
          fi

          retry_op 5 15 gh pr create \
            --base dev \
            --head "${{ needs.apply-fix.outputs.branch }}" \
            --title "${{ needs.apply-fix.outputs.issue_title }}" \
            --body "Closes #${{ needs.apply-fix.outputs.issue_num }}

          🤖 Generated by AI agent. Automated review will follow.
          Final approval required from @jay9297." \
            --label "ai-generated"
