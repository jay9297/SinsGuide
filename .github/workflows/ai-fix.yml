name: AI Fix
on:
  issues:
    types: [labeled]

jobs:
  fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Verify ANTHROPIC_API_KEY is NOT set
        run: |
          if [[ -n "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::ANTHROPIC_API_KEY is set; would override Pro subscription auth and incur PAYG charges"
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps + Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr xvfb \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1
          pip install -r sin_guide/requirements.txt
          pip install pytest pytest-cov pytest-qt pytest-xvfb ruff mypy

      - name: Install Claude Code & OpenCode if missing
        run: |
          command -v claude || npm install -g @anthropic-ai/claude-code
          command -v opencode || curl -fsSL https://opencode.ai/install | bash

      - name: Run AI agent
        run: |
          ISSUE_TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          ISSUE_BODY=$(jq -r '.issue.body' "$GITHUB_EVENT_PATH")
          ISSUE_NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          PROMPT=$(cat <<EOF
          You are resolving GitHub issue #${ISSUE_NUM} in jay9297/SinsGuide.

          Title: ${ISSUE_TITLE}

          Body:
          ${ISSUE_BODY}

          Follow the rules in CLAUDE.md. Make the minimal correct change.
          Add or update tests in tests/. Run the test suite with
          xvfb-run -a pytest tests/ -v and ensure it passes before finishing.
          If you change UI rendering, regenerate visual snapshots.
          Do not commit if tests fail.
          EOF
          )

          ./scripts/ai-agent.sh "$PROMPT" --mode fix --max-turns 40

      - name: Verify tests pass
        run: xvfb-run -a pytest tests/ -v

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          ISSUE_TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          BRANCH="ai-fix/issue-${ISSUE_NUM}"

          git config user.name "ai-agent[bot]"
          git config user.email "ai-agent@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by agent — aborting"
            exit 1
          fi
          git commit -m "fix: resolve issue #${ISSUE_NUM}"
          git push -u origin "$BRANCH"
          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUM}

          🤖 Generated by AI agent. Awaiting automated review and final
          approval from @jay9297." \
            --label "ai-generated"
