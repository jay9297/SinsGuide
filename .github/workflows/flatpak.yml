name: Flatpak

on:
  push:
    branches: [dev, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [dev, main]

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flatpak/flatpak-github-actions:gnome-46
      options: --privileged

    strategy:
      matrix:
        arch: [x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Flatpak dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
            ~/.cache/flatpak-builder
          key: flatpak-${{ matrix.arch }}-${{ hashFiles('packaging/com.sin_guide.SinsGuide.yml') }}

      - name: Install KDE runtime and SDK
        run: |
          flatpak install --noninteractive --or-update \
            org.kde.Platform//6.10 \
            org.kde.Sdk//6.10

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: SinsGuide-${{ github.ref_name }}.flatpak
          manifest-path: packaging/com.sin_guide.SinsGuide.yml
          cache-key: flatpak-${{ matrix.arch }}
          arch: ${{ matrix.arch }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: SinsGuide-${{ github.ref_name }}-${{ matrix.arch }}
          path: SinsGuide-*.flatpak

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SinsGuide-*.flatpak
          generate_release_notes: true
