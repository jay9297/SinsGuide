name: Bug report
description: Report a bug or unexpected behaviour in Sin's Guide.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you can — the more detail, the faster it gets fixed.

  - type: checkboxes
    id: duplicates
    attributes:
      label: Check for duplicates
      options:
        - label: I've searched [existing issues](https://github.com/jay9297/SinsGuide/issues?q=is%3Aissue) and this hasn't been reported yet
          required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (X11)
        - Linux (XWayland)
        - Windows
        - macOS
      default: 0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sin's Guide version
      placeholder: e.g. v0.3.1 or commit hash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the overlay
        2. Load guide for Act X
        3. ...
    validations:
      required: true

  - type: textarea
    id: overlay_settings
    attributes:
      label: Overlay settings (if relevant)
      description: Transparency, font size, width, position, show_timer, show_effective_exp, etc.
      placeholder: transparency=0.8, font_size=14, width=260
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant log output or attach screenshots here.
    validations:
      required: false
